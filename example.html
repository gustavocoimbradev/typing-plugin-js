<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing js Plugin</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="typing-js" typing-time="40" sleeping-time="1450" deleting-time="25" interval-time="1000" typing-loop="1">
